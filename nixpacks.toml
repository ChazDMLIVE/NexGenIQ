# Nixpacks build configuration for deploying the NexGenIQ BACKEND.
#
# The backend service is deployed with its root directory set to the
# REPOSITORY ROOT (leave the Railway "Root Directory" field empty). The
# whole repo tree - engine/, sim/ and backend/ - is then present, so the
# engine packages install cleanly.
#
# The frontend is a separate service and uses frontend/railway.json.

providers = ["python"]

[phases.install]
# Install the two NexGenIQ engines from their in-repo directories
# (editable installs - no wheel build), then the backend's own
# dependencies. The build context is the repo root, so ./engine and
# ./sim resolve directly.
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -e ./engine -e ./sim",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
]

[start]
# Start the FastAPI backend via the root-level entry point main.py,
# which puts backend/ on the import path. A single command, no directory
# changes - run from the repo root.
cmd = ". /opt/venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port $PORT"
