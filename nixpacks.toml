# Nixpacks build configuration for deploying the NexGenIQ BACKEND.
#
# This file is used when the backend service is deployed with its root
# directory set to the REPOSITORY ROOT (not the backend/ subdirectory).
# Building from the root means the whole repo tree - engine/, sim/ and
# backend/ - is present, so the two engine packages install cleanly with
# no relative-path or private-repo-auth problems.
#
# The frontend is a separate service and uses frontend/railway.json.

providers = ["python"]

[phases.install]
# Install the two NexGenIQ engines from their in-repo directories, then
# the backend's own dependencies.
#
# The engines are installed EDITABLE (pip install -e): an editable
# install adds the package to the path without building a wheel, which
# is faster and avoids wheel-build filesystem issues. Because the build
# context is the repo root, the paths engine/ and sim/ resolve directly.
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -e ./engine -e ./sim",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
]

[start]
# Start the FastAPI backend. uvicorn is run with the app import path
# relative to the backend/ directory.
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
